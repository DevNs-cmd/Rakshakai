services:
  - type: web
    name: rakshak-backend
    env: docker
    region: singapore
    plan: starter
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: ENABLE_ACCESS_LOG
        value: "True"
      - key: ENVIRONMENT
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: rakshak-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rakshak-redis
          property: connectionString

  - type: psql
    name: rakshak-db
    plan: starter
    region: singapore
    databaseName: rakshak
    user: postgres

  - type: redis
    name: rakshak-redis
    plan: starter
    region: singapore
    maxmemoryPolicy: allkeys-lru
